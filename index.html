<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學生成績查詢</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    background: #f5f6fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    color: #1a1a2e;
  }
  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 600;
    color: #1a1a2e;
    margin-bottom: 0.3rem;
  }
  .header p {
    font-size: 0.9rem;
    color: #666;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 500;
    color: #444;
    margin-bottom: 0.4rem;
  }
  input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    font-size: 1rem;
    margin-bottom: 1.2rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus { border-color: #4a90d9; }
  button {
    width: 100%;
    padding: 0.85rem;
    background: #3a7bd5;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  button:hover { background: #2f6ab8; }
  button:active { background: #265fa0; }
  .msg {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    border-radius: 10px;
    font-size: 0.9rem;
    text-align: center;
  }
  .msg.error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
  .msg.loading { background: #f0f6ff; color: #3a7bd5; border: 1px solid #b8d4f5; }
  .result-card {
    margin-top: 1.5rem;
    background: #f8faff;
    border-radius: 12px;
    border: 1px solid #d4e4f7;
    overflow: hidden;
  }
  .result-header {
    background: #3a7bd5;
    color: #fff;
    padding: 1rem 1.2rem;
  }
  .result-header .name {
    font-size: 1.1rem;
    font-weight: 600;
  }
  .result-header .meta {
    font-size: 0.82rem;
    opacity: 0.85;
    margin-top: 2px;
  }
  .grades-table {
    width: 100%;
    border-collapse: collapse;
  }
  .grades-table tr:not(:last-child) {
    border-bottom: 1px solid #e8f0fb;
  }
  .grades-table td {
    padding: 0.75rem 1.2rem;
    font-size: 0.95rem;
  }
  .grades-table td:first-child { color: #555; }
  .grades-table td:last-child {
    text-align: right;
    font-weight: 600;
    color: #2c5fa8;
  }
  .grades-table tr:nth-child(even) td { background: #f0f6ff; }
</style>
</head>
<body>
<div class="header">
  <h1>學生成績查詢</h1>
  <p>請輸入您的班級與學號以查詢成績</p>
</div>

<div class="card">
 <label for="sname">班級</label>
  <input type="text" id="sname" placeholder="請輸入班級(A或B)" autocomplete="off">
  <label for="sid">學號</label>
  <input type="text" id="sid" placeholder="請輸入學號" autocomplete="off">
  
  <button onclick="lookup()">查詢成績</button>
  <div id="msg"></div>
  <div id="result"></div>
</div>

<script>
const SHEET_ID = '1LgtrNxI6zjXP48FAFG1UwTVUk42iwsX-X7SLHqXnELk';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (let line of lines) {
    const cols = [];
    let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    rows.push(cols);
  }
  return rows;
}

async function lookup() {
  const sid = document.getElementById('sid').value.trim();
  const sname = document.getElementById('sname').value.trim();
  const msgEl = document.getElementById('msg');
  const resultEl = document.getElementById('result');

  resultEl.innerHTML = '';
  if (!sid || !sname) {
    msgEl.innerHTML = '<div class="msg error">請輸入班級與學號</div>';
    return;
  }

  msgEl.innerHTML = '<div class="msg loading">查詢中，請稍候…</div>';

  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('無法讀取資料');
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('資料表為空');

    const header = rows[0];
    // Col A=班級, Col B=學號, Col C..=成績科目
    const gradeHeaders = header.slice(2);

    const found = rows.slice(1).find(r => {
      const rowId = (r[1] || '').trim();
      const rowName = (r[0] || '').trim(); // name might be somewhere; let's try col B as id
      return rowId === sid;
    });

    // Re-map: A=班級, B=學號, C onwards=grades
    // We need name too — check if there's a name column; if not, match by id only
    // Actually per user: A=Class, B=id, C..=grades (no name column mentioned in revised spec)
    // But original spec had name. Let's match by id only and show class info.
    // Check all rows for id match
    const match = rows.slice(1).find(r => (r[1] || '').toString().trim() === sid.toString().trim());

    if (!match) {
      msgEl.innerHTML = '<div class="msg error">找不到符合的學號，請確認後再試</div>';
      return;
    }

    msgEl.innerHTML = '';

    const className = match[0] || '';
    const grades = match.slice(2);

    let gradeRows = '';
    gradeHeaders.forEach((h, i) => {
      const val = (grades[i] || '').trim();
      if (h && val) {
        gradeRows += `<tr><td>${h}</td><td>${val}</td></tr>`;
      }
    });

    if (!gradeRows) {
      msgEl.innerHTML = '<div class="msg error">該學生尚無成績資料</div>';
      return;
    }

    resultEl.innerHTML = `
      <div class="result-card">
        <div class="result-header">
          <div class="name">${sname}</div>
          <div class="meta">學號：${sid}　班級：${className}</div>
        </div>
        <table class="grades-table">${gradeRows}</table>
      </div>`;
  } catch (e) {
    msgEl.innerHTML = `<div class="msg error">查詢失敗：${e.message}<br><small>請確認試算表已設為「知道連結的人可檢視」</small></div>`;
  }
}

document.getElementById('sname').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
document.getElementById('sid').addEventListener('keydown', e => { if (e.key === 'Enter') lookup(); });
</script>
</body>
</html>
